app = 'flashcards-hargurjeet'
primary_region = 'sin'

[build]

[env]
  DB_PATH = '/data/flashcards.db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'

[[mounts]]
  source = 'flashcards_data'
  destination = '/data'
