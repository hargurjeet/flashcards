<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- Username Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <h1>Flashcards</h1>
      <p>Enter your name to load your cards</p>
      <form id="login-form">
        <input type="text" id="username-input" placeholder="Your name..." autocomplete="off" required />
        <button type="submit">Get Started</button>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden">
    <header>
      <div class="header-left">
        <h1>Flashcards</h1>
        <span id="user-badge"></span>
      </div>
      <button id="switch-user-btn">Log Out</button>
    </header>

    <section class="add-form">
      <h2>Add a Card</h2>
      <form id="card-form">
        <div class="form-group">
          <label for="question">Question (front)</label>
          <input type="text" id="question" placeholder="Enter your question..." required />
        </div>
        <div class="form-group">
          <label for="answer">Answer (back)</label>
          <textarea id="answer" rows="3" placeholder="Enter the answer..." required></textarea>
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <input type="text" id="category" list="category-suggestions" placeholder="e.g. Gen-AI, Machine Learning..." />
          <datalist id="category-suggestions"></datalist>
        </div>
        <button type="submit">Add Card</button>
      </form>
    </section>

    <div class="filter-bar" id="filter-bar"></div>
    <div class="recall-bar" id="recall-bar"></div>

    <section class="card-grid" id="card-grid"></section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
